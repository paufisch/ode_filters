site_name: ODE Filters
site_url: https://paufisch.github.io/ode_filters/
repo_url: https://github.com/paufisch/ode_filters
docs_dir: docs
theme:
  name: material
plugins:
  - search
  - mkdocs-jupyter:
      execute: true
  - mkdocstrings:
      default_handler: python
markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
extra_javascript:
  - javascripts/mathjax.js
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
nav:
  - Home: index.md
  - Quickstart example: examples/quickstart.ipynb
  - Examples:
      - Basic usage: examples/examples.ipynb
      - Second-order systems: examples/second-order-systems.ipynb
      - Advanced features: examples/advanced-features.ipynb
      - Adaptive steps and calibration: examples/adaptive-and-calibration.ipynb
  - Guides:
      - Diffusion calibration: calibration.md
      - Adaptive step-size control: adaptive-steps.md
  - API Reference:
      - Overview: api/index.md
      - Filters: api/filters/index.md
      - Inference: api/inference/index.md
      - Measurement: api/measurement/index.md
      - Priors: api/priors/index.md
