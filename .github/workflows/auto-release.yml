name: Auto Release

on:
  workflow_run:
    workflows: ["CI", "Deploy Docs"]
    types: [completed]
    branches: [main]

concurrency:
  group: auto-release-${{ github.event.workflow_run.head_sha }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    # Only run when the triggering workflow succeeded
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      contents: write
      actions: read

    steps:
      - name: Verify all required workflows succeeded
        uses: actions/github-script@v7
        with:
          script: |
            const headSha = '${{ github.event.workflow_run.head_sha }}';
            const { data: { workflow_runs } } = await github.rest.actions.listWorkflowRunsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head_sha: headSha,
              event: 'push'
            });
            const ci = workflow_runs.find(r => r.name === 'CI');
            const deployDocs = workflow_runs.find(r => r.name === 'Deploy Docs');
            if (!ci || ci.conclusion !== 'success') {
              throw new Error('CI workflow did not succeed');
            }
            if (!deployDocs || deployDocs.conclusion !== 'success') {
              throw new Error('Deploy Docs workflow did not succeed');
            }

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          fetch-depth: 2 # Need previous commit to compare versions

      - name: Get current version
        id: current_version
        run: |
          VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Get previous version
        id: prev_version
        run: |
          git checkout HEAD~1 -- pyproject.toml 2>/dev/null || echo "No previous commit"
          PREV_VERSION=$(grep '^version' pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/' || echo "0.0.0")
          echo "version=$PREV_VERSION" >> $GITHUB_OUTPUT
          git checkout HEAD -- pyproject.toml  # Restore current version

      - name: Check if patch bump
        id: patch_bump
        run: |
          CURRENT="${{ steps.current_version.outputs.version }}"
          PREV="${{ steps.prev_version.outputs.version }}"
          # Extract major.minor.patch (strip pre-release suffix like -dev)
          current_clean=$(echo "$CURRENT" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          prev_clean=$(echo "$PREV" | sed -E 's/^([0-9]+\.[0-9]+\.[0-9]+).*/\1/')
          # Patch bump: major and minor same, patch increased
          current_major=$(echo "$current_clean" | cut -d. -f1)
          current_minor=$(echo "$current_clean" | cut -d. -f2)
          current_patch=$(echo "$current_clean" | cut -d. -f3)
          prev_major=$(echo "$prev_clean" | cut -d. -f1)
          prev_minor=$(echo "$prev_clean" | cut -d. -f2)
          prev_patch=$(echo "$prev_clean" | cut -d. -f3)
          if [ "$current_major" = "$prev_major" ] && [ "$current_minor" = "$prev_minor" ] && [ "$current_patch" -gt "$prev_patch" ]; then
            echo "patch_bump=true" >> $GITHUB_OUTPUT
          else
            echo "patch_bump=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: steps.patch_bump.outputs.patch_bump == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.current_version.outputs.version }}
          name: Release v${{ steps.current_version.outputs.version }}
          draft: false
          generate_release_notes: true # Auto-generates notes from commits/PRs
